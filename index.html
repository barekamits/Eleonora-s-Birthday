<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
  }

  /* FIRST SCREEN */
  .screen1 {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle at center, #7a0f1c 0%, #3b0008 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0.8s ease;
    z-index: 10;
  }

  .screen1.hide {
    opacity: 0;
    pointer-events: none;
  }

  .subtitle {
    color: #f8e7e0;
    font-size: 20px;
    margin-bottom: 10px;
    letter-spacing: 2px;
    transform: translateY(100px); 
  }

  .title {
    color: #f8e7e0;
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    margin-bottom: 40px;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
    transform: translateY(150px); 
  }

  /* BOW */
  .bow {
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .bow img {
    width: 180px;
  }

  .bow:active {
    transform: scale(0.9);
  }

  /* SECOND SCREEN */
  .screen2 {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: url('second-bg.png') center/cover no-repeat; /* հետո կփոխես */
    opacity: 0;
    transition: 1s ease;
    z-index: 1;
  }

  .screen2.show {
    opacity: 1;
  }

</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div class="screen1" id="screen1">

  <div class="subtitle">You're invited to</div>

  <div class="title">
    Eleonora's Birthday Party
  </div>

  <div class="bow" id="bow">
    <img src="https://uploads.onecompiler.io/43gpeysj6/44gm5u644/bant.png">
  </div>

</div>

<!-- SECOND SCREEN -->
<div class="screen2" id="screen2"></div>

<script>
  const bow = document.getElementById('bow');
  const screen1 = document.getElementById('screen1');
  const screen2 = document.getElementById('screen2');

  bow.addEventListener('click', () => {
    // առաջին էկրանը անհետանա
    screen1.classList.add('hide');

    // հետո նոր կոնտենտը հայտնվի
    setTimeout(() => {
      screen2.classList.add('show');
    }, 400);
  });
</script>

</body>
</html>
